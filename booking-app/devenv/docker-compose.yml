services:
  postgres:
    image: postgres:18-alpine
    container_name: booking-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-booking}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-booking}
      POSTGRES_DB: ${DATABASE_NAME:-booking}
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-booking} -d ${DATABASE_NAME:-booking}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: booking-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: devenv/Dockerfile
    container_name: booking-app
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ..:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
