services:
  postgres:
    image: postgres:18-alpine
    container_name: booking-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-booking}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-booking}
      POSTGRES_DB: ${DATABASE_NAME:-booking}
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-booking} -d ${DATABASE_NAME:-booking}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: booking-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
