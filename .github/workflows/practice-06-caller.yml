name: Practice 06 — Secrets and Environment Variables

on:
  workflow_dispatch:

# Restrict GITHUB_TOKEN to least privilege for the entire workflow
permissions:
  contents: read

# Workflow-level env vars: available to all jobs and steps
env:
  NODE_VERSION: '20'
  APP_NAME: booking-app

jobs:
  #  Three scopes of env vars — workflow / job / step
  env-scopes:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: info        # Job-level: overrides workflow-level when names conflict
    steps:
      - name: Print workflow-level vars
        run: |
          echo "NODE_VERSION (workflow)  = $NODE_VERSION"
          echo "APP_NAME (workflow)      = $APP_NAME"

      - name: Print job-level var
        run: echo "LOG_LEVEL (job) = $LOG_LEVEL"

      - name: Step overrides workflow-level NODE_VERSION
        env:
          NODE_VERSION: '18'   # Step-level wins — only within this step
        run: echo "NODE_VERSION in this step = $NODE_VERSION"

      - name: Confirm override is local only
        run: echo "NODE_VERSION back to workflow-level = $NODE_VERSION"

      - name: Print default GitHub env vars
        run: |
          echo "GITHUB_SHA          = $GITHUB_SHA"
          echo "GITHUB_REF_NAME     = $GITHUB_REF_NAME"
          echo "GITHUB_REPOSITORY   = $GITHUB_REPOSITORY"
          echo "GITHUB_ACTOR        = $GITHUB_ACTOR"
          echo "GITHUB_WORKFLOW     = $GITHUB_WORKFLOW"
          echo "GITHUB_RUN_NUMBER   = $GITHUB_RUN_NUMBER"
          echo "GITHUB_EVENT_NAME   = $GITHUB_EVENT_NAME"
          echo "CI                  = $CI"
          echo "RUNNER_OS           = $RUNNER_OS"

  # Pass computed values between steps via $GITHUB_ENV
  dynamic-env:
    runs-on: ubuntu-latest
    steps:
      - name: Compute values and write to GITHUB_ENV
        run: |
          IMAGE_TAG="${{ env.APP_NAME }}:${{ github.ref_name }}-$(echo '${{ github.sha }}' | cut -c1-7)"
          BUILD_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "BUILD_AT=$BUILD_AT"   >> $GITHUB_ENV

          # Note: IMAGE_TAG is a local shell variable here, not yet available as $IMAGE_TAG env var
          echo "In this step, IMAGE_TAG shell var = '${IMAGE_TAG}' (not yet in env)"

      - name: Use computed values (now available via $GITHUB_ENV)
        run: |
          echo "IMAGE_TAG = $IMAGE_TAG"
          echo "BUILD_AT  = $BUILD_AT"

      - name: Write step summary
        run: |
          {
            echo "## Build Info"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Image tag | \`$IMAGE_TAG\` |"
            echo "| Built at  | $BUILD_AT |"
            echo "| Branch    | ${{ github.ref_name }} |"
          } >> $GITHUB_STEP_SUMMARY

  # Safe secret usage — always map to env var first
  secret-safe-pattern:
    runs-on: ubuntu-latest
    steps:
      # CORRECT: map to env var, then reference $API_KEY inside the shell command
      - name: Call API — safe pattern
        env:
          API_KEY: ${{ secrets.PRACTICE_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "PRACTICE_API_KEY is not set — skipping"
          else
            echo "API_KEY is set (masked). Would run:"
            echo "  curl -H 'Authorization: Bearer \$API_KEY' https://api.example.com"
          fi

      # WRONG (kept as comment): interpolating the secret directly into the run string
      # risks shell injection if the secret contains special characters
      # - run: curl -H "Authorization: Bearer ${{ secrets.PRACTICE_API_KEY }}" https://api.example.com

      - name: Check whether secrets are set (safe — no value exposed)
        run: |
          echo "PRACTICE_API_KEY present: ${{ secrets.PRACTICE_API_KEY != '' }}"
          echo "SECRET_DB_URL present:    ${{ secrets.SECRET_DB_URL != '' }}"

  #GITHUB_TOKEN — auto-created, short-lived, least privilege
  github-token-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # Enough to checkout and read repo info via the API
    steps:
      - uses: actions/checkout@v4

      - name: Use GITHUB_TOKEN to call the GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Repo info via GITHUB_TOKEN ==="
          gh api /repos/${{ github.repository }} --jq '{name: .name, private: .private, default_branch: .default_branch}'

      - name: Show that GITHUB_TOKEN requires no manual setup
        run: |
          echo "GITHUB_TOKEN present: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "This token is auto-created per run and expires when the workflow finishes"
          echo "Scope: only repo ${{ github.repository }}"

  # Service container — inject credentials into the container env
  service-container:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          # Hardcoding credentials here is fine: this container is ephemeral and
          # only reachable within the runner VM for the duration of this job
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Connect to Postgres and run queries
        env:
          PGPASSWORD: testpass    # psql reads credentials from env var, not CLI args
        run: |
          echo "=== Connecting to Postgres service container ==="
          psql -h localhost -U testuser -d testdb -c "SELECT version();"
          psql -h localhost -U testuser -d testdb -c "CREATE TABLE test_table (id SERIAL PRIMARY KEY, name TEXT);"
          psql -h localhost -U testuser -d testdb -c "INSERT INTO test_table (name) VALUES ('hello-from-ci');"
          psql -h localhost -U testuser -d testdb -c "SELECT * FROM test_table;"

      - name: Write step summary
        run: |
          {
            echo "## Service Container Test"
            echo "- Postgres 18-alpine started successfully"
            echo "- Connected via \`localhost:5432\`"
            echo "- Created and queried \`test_table\` successfully"
          } >> $GITHUB_STEP_SUMMARY

  # vars context vs secrets context
  vars-vs-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: vars are visible in logs (non-sensitive config)
        run: |
          echo "DEPLOY_URL (vars)       = ${{ vars.DEPLOY_URL }}"
          echo "APP_NODE_VERSION (vars) = ${{ vars.APP_NODE_VERSION }}"

      - name: secrets are masked in logs
        env:
          API_KEY: ${{ secrets.PRACTICE_API_KEY }}
        run: |
          echo "PRACTICE_API_KEY present: ${{ secrets.PRACTICE_API_KEY != '' }}"
          # If a value exists, this line prints *** — GitHub masks the exact secret string
          echo "API_KEY value = $API_KEY"

      - name: Write vars vs secrets summary
        run: |
          {
            echo "## vars vs secrets"
            echo "| Context | Use for | Visible in logs? |"
            echo "|---------|---------|-----------------|"
            echo "| \`vars.X\` | URLs, feature flags, non-sensitive config | Yes |"
            echo "| \`secrets.X\` | API keys, passwords, tokens | No (masked as \`***\`) |"
          } >> $GITHUB_STEP_SUMMARY

  # Environment-scoped job — unlocks environment secrets
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging      # Unlocks environment secrets and triggers protection rules
    steps:
      - name: Use environment secret
        env:
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          echo "Deploying to staging..."
          if [ -z "$STAGING_DB_PASSWORD" ]; then
            echo "STAGING_DB_PASSWORD is not set in the 'staging' environment"
          else
            echo "STAGING_DB_PASSWORD is set (masked). Connecting to staging DB..."
          fi
          echo "DEPLOY_URL = ${{ vars.DEPLOY_URL }}"

  # Call a reusable workflow and pass secrets explicitly
  call-reusable:
    uses: ./.github/workflows/practice-06-reusable.yml
    with:
      target-env: staging
    secrets:
      api-key: ${{ secrets.PRACTICE_API_KEY }}
      # Alternative: secrets: inherit  (forwards all caller secrets automatically)
