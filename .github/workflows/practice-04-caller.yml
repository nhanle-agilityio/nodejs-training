name: Practice 04 — Caller Workflow

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    uses: ./.github/workflows/practice-04-reusable.yml
    with:
      environment: staging
      dry-run: false
    secrets:
      deploy-key: ${{ secrets.DEPLOY_KEY }}

  deploy-production:
    uses: ./.github/workflows/practice-04-reusable.yml
    with:
      environment: production
      dry-run: true
    secrets:
      deploy-key: ${{ secrets.DEPLOY_KEY }}

  notify:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    steps:
      - name: Print deployed URLs
        run: |
          echo "Staging URL:    ${{ needs.deploy-staging.outputs.deployed-url }}"
          echo "Production URL: ${{ needs.deploy-production.outputs.deployed-url }}"

      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL | Dry Run |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.deploy-staging.outputs.deployed-url }} | No |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.outputs.deployed-url }} | Yes |" >> $GITHUB_STEP_SUMMARY
