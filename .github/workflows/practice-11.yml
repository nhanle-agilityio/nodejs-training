name: Practice 11 — CD Build and Deploy to Railway

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Never cancel an in-progress deploy.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Build multi-stage image and push to ghcr.io
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./booking-app
          file: ./booking-app/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # Run migrations
  deploy:
    name: Migrate & Deploy (Railway)
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./booking-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: booking-app/package-lock.json
      - run: npm ci

      - name: Run database migrations
        run: npm run migration:run
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}

      # Trigger Railway to pull the fresh :latest image and redeploy.
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy on Railway
        run: railway redeploy --service "${{ vars.RAILWAY_SERVICE || 'booking-app' }}" --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check
        run: |
          echo "Waiting for the new deploy to become healthy..."
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RAILWAY_APP_URL }}/health" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then echo "Healthy ✅"; exit 0; fi
            sleep 10
          done
          echo "Health check never returned 200 ❌"
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          echo "## Railway Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.docker-build.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ vars.RAILWAY_SERVICE || 'booking-app' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | ${{ secrets.RAILWAY_APP_URL }} |" >> $GITHUB_STEP_SUMMARY
